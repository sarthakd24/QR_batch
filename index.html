<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batch Story | Rooted</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,500&family=Inter:wght@300;400;500&display=swap');
:root{--crimson:#B5173A;--petal:#F2D0D8;--forest:#2C4A35;--mist:#EEF2EE;--bark:#5C3D2E;--ink:#1A1A1A;--fog:#8A9B8A;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--mist);color:var(--ink);min-height:100vh;}

.hero{background:var(--forest);padding:52px 24px 48px;text-align:center;position:relative;overflow:hidden;}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 40%;opacity:0.38;}
.hero::before{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(44,74,53,0.45) 0%,rgba(44,74,53,0.88) 100%);z-index:1;}
.hero>*{position:relative;z-index:2;}
.hero-badge{display:inline-block;font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--petal);border:1px solid rgba(242,208,216,.4);padding:5px 14px;border-radius:20px;margin-bottom:18px;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(24px,6vw,44px);font-weight:700;color:#fff;line-height:1.2;}
.hero h1 em{font-style:italic;color:var(--petal);}
.hero-sub{margin-top:10px;font-size:13px;color:rgba(255,255,255,.5);letter-spacing:.04em;}

.not-found{max-width:440px;margin:40px auto;background:#fff;border-radius:16px;padding:32px 24px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08);}
.not-found h2{font-family:'Playfair Display',serif;color:var(--forest);margin-bottom:10px;}
.not-found p{font-size:14px;color:var(--fog);line-height:1.7;}

.batch-card{max-width:480px;margin:-22px auto 0;background:#fff;border-radius:16px;box-shadow:0 4px 32px rgba(0,0,0,.08);overflow:hidden;position:relative;z-index:10;}
.batch-id-strip{background:var(--crimson);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;}
.batch-id-strip span{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.7);}
.batch-id-strip strong{font-size:13px;color:#fff;font-family:'Playfair Display',serif;letter-spacing:.08em;}
.farmer-section{padding:26px 24px 18px;display:flex;gap:16px;align-items:flex-start;}
.farmer-avatar{width:60px;height:60px;border-radius:50%;background:var(--petal);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:var(--crimson);}
.farmer-info h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--forest);}
.farmer-info .role{font-size:12px;color:var(--fog);letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}
.farmer-info .village{margin-top:8px;font-size:14px;color:var(--bark);}
.divider{height:1px;background:#F0F0EE;margin:0 24px;}
.data-grid{padding:18px 24px 22px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.data-cell label{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--fog);display:block;margin-bottom:3px;}
.data-cell span{font-size:14px;font-weight:500;color:var(--ink);}
.data-cell.full{grid-column:1/-1;}
.gps-chip{display:inline-flex;align-items:center;gap:6px;background:var(--mist);border:1px solid #D8E5D8;border-radius:8px;padding:6px 12px;font-size:12px;color:var(--forest);text-decoration:none;font-weight:500;}
.gps-chip:hover{background:#D8E5D8;}

.verify-banner{max-width:480px;margin:14px auto;background:var(--forest);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;}
.verify-icon{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.verify-text p{font-size:13px;color:rgba(255,255,255,.9);line-height:1.5;}
.verify-text strong{color:var(--petal);}

.section-label{max-width:480px;margin:22px auto 10px;padding:0 16px;font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--fog);}
.timeline{max-width:480px;margin:0 auto 20px;padding:0 16px;}
.t-step{display:flex;gap:14px;position:relative;}
.t-step:not(:last-child)::before{content:'';position:absolute;left:18px;top:36px;bottom:-4px;width:2px;background:#D8E5D8;}
.t-dot{width:36px;height:36px;border-radius:50%;background:#fff;border:2px solid #D8E5D8;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:4px;}
.t-step.done .t-dot{border-color:var(--forest);background:var(--forest);}
.t-body{padding:6px 0 18px;}
.t-body h4{font-size:14px;font-weight:500;color:var(--ink);}
.t-body p{font-size:12px;color:var(--fog);margin-top:2px;}

.org-footer{max-width:480px;margin:0 auto;padding:16px 32px;background:#fff;border-radius:12px;}
.org-footer p{font-size:12px;color:var(--fog);line-height:1.7;}
.org-footer strong{color:var(--forest);font-weight:600;}
.rooted-footer{text-align:center;padding:22px 16px 32px;font-size:11px;color:var(--fog);letter-spacing:.06em;}
.rooted-footer strong{color:var(--crimson);font-family:'Playfair Display',serif;font-size:13px;display:block;margin-bottom:4px;}

/* Source note */
.source-note{max-width:480px;margin:10px auto 0;padding:0 16px;}
.source-note span{font-size:10px;color:var(--fog);display:flex;align-items:center;gap:4px;}

@media(max-width:500px){
  .batch-card,.verify-banner,.section-label,.timeline,.org-footer,.source-note{margin-left:12px;margin-right:12px;}
}
</style>
</head>
